# ============================================================
# REINVENT 4 — AmpC β-LACTAMASE 
# ============================================================

[parameters]
run_type             = "reinforcement_learning"
device               = "cuda:0"
tb_logdir            = "logs/tb_ampc"
json_out_config      = "logs/config_ampc.json"

model_file           = "priors/reinvent.prior"
agent_file           = "priors/reinvent.prior"
output_model_file    = "output/agent_ampc.ckpt"

# ── Training loop ────────────────────────────────────────────
[parameters.reinforcement_learning]
n_steps              = 5000           
batch_size           = 128
sigma                = 128
learning_rate        = 0.0001
clip_gradient_norm   = 1.0

# ── Diversity filter ─────────────────────────────────────────
[parameters.diversity_filter]
type                 = "IdenticalMurckoScaffold"
bucket_size          = 100            
minscore             = 0.5          
minsimilarity        = 0.4

# ── Inception ────────────────────────────────────
[parameters.inception]

memory_size          = 100
sample_size          = 10

# ============================================================
# SCORING FUNCTION 
# ============================================================
[scoring]
type = "geometric_mean"

# ── Component 1: QED (5%) ────────────────────────────────────
[[scoring.component]]
type = "QED"
name = "qed"

  [scoring.component.weight]
  value = 0.05            
  [scoring.component.transform]
  type = "sigmoid"
  low  = 0.6
  high = 0.9
  k    = 0.5


# ── Component 2: SA Score (10%) ──────────────────────────────
[[scoring.component]]
type = "MolecularDescriptor"
name = "sa_score"
specific_parameters = {descriptor = "SAScore"}

  [scoring.component.weight]
  value = 0.10            

  [scoring.component.transform]
  type = "reverse_sigmoid"
  low  = 1.0
  high = 4.0
  k    = 0.5


# ── Component 3: LogP (10%) ──────────────────────────────────
[[scoring.component]]
type = "MolecularDescriptor"
name = "logp"
specific_parameters = {descriptor = "MolLogP"}

  [scoring.component.weight]
  value = 0.10          

  [scoring.component.transform]
  type = "double_sigmoid"
  low  = 2.0
  high = 5.0
  coef_div = 5.0
  coef_si  = 20.0
  coef_se  = 20.0


# ── Component 4: Tanimoto Dissimilarity (5%) ─────────────────
[[scoring.component]]
type = "TanimotoSimilarity"
name = "tanimoto_dissimilarity"

  [scoring.component.weight]
  value = 0.05          

  [scoring.component.specific_parameters]
  smiles = [
    "COc1cccc(Nc2c(C(N)=O)cnc3c(C)cc(S(=O)(=O)c4cccc(C(=O)N(C)C)c4)cc23)c1",
    "COc1ccc(-c2nc(C(=O)NCc3coc4ccccc34)c([C@@H](C)N)o2)c2ccc(C(F)(F)F)nc12",
    "COc1cccc(Nc2c(C(N)=O)cnc3ccc(S(=O)(=O)c4cccc(C(=O)N(C)C)c4)cc23)c1",
    "Cc1cc(C(=O)N[C@H]2CC[C@@H](NC(=O)c3cc(F)cnc3Oc3cccc(-c4ccc(O)cc4CN4CCCOCC4)c3)CC2)nn1C",
    "Cn1nc(C(=O)NC2CCC(NC(=O)c3cc(F)cnc3Oc3cccc(-c4ccc(CCCN5CCNCC5)cc4)c3)CC2)cc1C(F)(F)F",
  ]
  radius     = 2
  use_counts = true
  use_features = false

  [scoring.component.transform]
  type = "reverse_sigmoid"
  low  = 0.1
  high = 0.4
  k    = 0.5


# ── Component 5: Brenk Filter (5%) ───────────────────────────
# Молекула БЕЗ alerts → score = 1.0
# Молекула С alerts → score = 0.0
[[scoring.component]]
type = "CustomAlerts"
name = "brenk_filter"

  [scoring.component.weight]
  value = 0.05         

  [scoring.component.specific_parameters]
  smarts = [
    "[#6;r3]1~[#6;r3]~[#6;r3]1",
    "[#6](=O)[F,Cl,Br,I]",
    "[CH1](=O)",
    "[S;X2](=O)",
    "[C,c]-S(=O)(=O)-[Cl]",
    "N=!@N",
    "[N;!$(N-C=O)]~[N;!$(N-C=O)]",
    "C(=O)OC(=O)",
    "C=CC(=O)",
    "[N+](=O)[O-]",
    "c1ccc2c(c1)ccc3cccc4cccc2c34",
    "c1ccc2[nH]ccc2c1",
    "[OH]c1ccc(cc1)[NH2]",
    "[SH]",
    "c1ccc(cc1)C=NNc2ccccc2",
    "O=C1C=CC(=O)c2ccccc21",
    "C1=CC(=O)C=CC1=O",
    "[#6]~[#7]~[#7]~[#6]",
    "[#6;r8,r9,r10,r11,r12,r13,r14]",
    "[P;!$(P(=O))]",
    "[Se]",
    "[Te]",
  ]


# ── Component 6: QSAR (40%) ──────────────────────────────────
[[scoring.component]]
type = "CustomMolecularDescriptor"
name = "qsar_ampc"
description = "QSAR prediction of pIC50 activity against AmpC"

  [scoring.component.weight]
  value = 0.40              

  [scoring.component.specific_parameters]
  
  model_path = "models/qsar_ampC.cbm"
  
  descriptor_type = "Morgan"
  radius = 2
  nBits = 2048

  use_classical_descriptors = true
  classic_descriptors = [
    "MolWt",              # Молекулярный вес
    "MolLogP",            # LogP (липофильность)
    "NumHAcceptors",      # H-bond acceptors
    "NumHDonors",         # H-bond donors
    "RingCount",          # Количество колец
    "TPSA",               # Топологическая полярная площадь
    "NumAromaticRings",   # Ароматические кольца
    "FractionCSP3",       # sp3 фракция (гибкость)
    "NumHeterocycles",    # Гетероциклы
    "NHOHCount",          # N-H и O-H группы
    ]

  [scoring.component.transform]
  type = "sigmoid"
  high = 7.5
  low = 5.0
  k = 2.0


# ── Component 7: Pharmacophore (20%) ─────────────────────────
[[scoring.component]]
type = "CustomMolecularDescriptor"
name = "pharmacophore_ampc"
description = "Pharmacophore matching for AmpC binding site"

  [scoring.component.weight]
  value = 0.20             

  [scoring.component.specific_parameters]
  
  ph4_file = "pharmacophore/ampC_pharmacophore_consensus.ph4"
  
  required_features = {
    HBA = 1,
    HBD = 1,
    Hydrophobic = 1
  }
  
  match_threshold = 1.5

  [scoring.component.transform]
  type = "linear"
  high = 3.0
  low = 0.0


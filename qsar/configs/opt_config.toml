name = "PathFP"

[descriptors.parameters]
maxPath = 3
fpSize = 2048

[data]
training_dataset_file = "qsar/dataset/AID_585_test_str.csv"
input_column = "smiles"
response_column = "activity"
response_type = "regression"
save_intermediate_files = false
log_transform = false
probabilistic_threshold_representation = false
assess_modelability = false

[settings]
mode = [ "r", "e", "g", "r", "e", "s", "s", "i", "o", "n",]
shuffle = false
direction = [ "m", "a", "x", "i", "m", "i", "z", "e",]
scoring = "neg_mean_squared_error"
minimise_std_dev = false
use_cache = true
n_trials = 100
n_splits = 3
n_replicates = 5
n_jobs = -1
n_startup_trials = 50
random_seed = 44
track_to_mlflow = false
split_chemprop = true
n_chemprop_trials = 1

[data.deduplication_strategy]
name = "KeepAllNoDeduplication"

[data.split_strategy]
name = "Stratified"
fraction = 0.2
seed = 1
leave_out = 0.0
bins = "fd_merge"

[settings.optimization_split_strategy]
name = "Stratified"
fraction = 0.2
seed = 1
leave_out = 0.0
bins = "fd_merge"

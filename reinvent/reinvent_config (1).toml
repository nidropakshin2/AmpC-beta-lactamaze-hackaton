# ============================================================
# REINVENT 4 — Reinforcement Learning Configuration
# Components:
#   1. QED          >= 0.6
#   2. SA Score     <= 4.0
#   3. LogP         2.0 – 5.0
#   4. Tanimoto     dissimilarity from reference set
#   5. Brenk        structural alert filter
# ============================================================

[parameters]
run_type             = "reinforcement_learning"
device               = "cuda:0"           # "cpu" if no GPU
tb_logdir            = "logs/tb"
json_out_config      = "logs/config.json"

model_file           = "priors/reinvent.prior"
agent_file           = "priors/reinvent.prior"
output_model_file    = "output/agent.ckpt"

# ── Training loop ────────────────────────────────────────────
[parameters.reinforcement_learning]
n_steps              = 1000
batch_size           = 128
sigma                = 128
learning_rate        = 0.0001
clip_gradient_norm   = 1.0

# ── Diversity filter ─────────────────────────────────────────
[parameters.diversity_filter]
type                 = "IdenticalMurckoScaffold"
bucket_size          = 25
minscore             = 0.4
minsimilarity        = 0.4

# ── Inception ────────────────────────────────────────────────
[parameters.inception]
smiles               = []
memory_size          = 100
sample_size          = 10

# ============================================================
# SCORING FUNCTION
# geometric_mean: любой слабый компонент тянет итог вниз
# ============================================================
[scoring]
type = "geometric_mean"

# ── Component 1: QED ─────────────────────────────────────────
# Quantitative Estimate of Drug-likeness (0 → 1)
# Цель: QED >= 0.6, идеал >= 0.8
[[scoring.component]]
type = "QED"
name = "qed"

  [scoring.component.weight]
  value = 1.0

  [scoring.component.transform]
  type = "sigmoid"
  low  = 0.6        # начало награды
  high = 0.9        # насыщение
  k    = 0.5

# ── Component 2: SA Score ─────────────────────────────────────
# Synthetic Accessibility (1 = легко, 10 = сложно)
# Цель: SA <= 4.0 — наказываем трудносинтезируемые молекулы
[[scoring.component]]
type = "MolecularDescriptor"
name = "sa_score"
specific_parameters = {descriptor = "SAScore"}

  [scoring.component.weight]
  value = 1.0

  [scoring.component.transform]
  type = "reverse_sigmoid"
  low  = 1.0        # легкосинтезируемые — высокий score
  high = 4.0        # SA > 4 начинает штрафоваться
  k    = 0.5

# ── Component 3: LogP ─────────────────────────────────────────
# Lipophilicity (Wildman-Crippen)
# Цель: 2.0 – 5.0  (оптимальное окно для пероральных препаратов)
# double_sigmoid создаёт "колокол" — штрафует выход за границы
[[scoring.component]]
type = "MolecularDescriptor"
name = "logp"
specific_parameters = {descriptor = "MolLogP"}

  [scoring.component.weight]
  value = 1.0

  [scoring.component.transform]
  type     = "double_sigmoid"
  low      = 2.0        # нижняя граница окна
  high     = 5.0        # верхняя граница окна
  coef_div = 5.0
  coef_si  = 20.0
  coef_se  = 20.0

# ── Component 4: Tanimoto Dissimilarity ───────────────────────
# REINVENT нативно считает Tanimoto SIMILARITY к референсным молекулам.
# Чтобы получить DISSIMILARITY, инвертируем через reverse_sigmoid:
#   dissimilarity_score = 1 - tanimoto_similarity
# Цель: генерировать новые скаффолды, непохожие на reference set.
#
# ВАЖНО: замени smiles ниже на свои референсные молекулы.
# Можно указать несколько — берётся максимальное сходство по списку.
[[scoring.component]]
type = "TanimotoSimilarity"
name = "tanimoto_dissimilarity"

  [scoring.component.weight]
  value = 1.0

  [scoring.component.specific_parameters]
  smiles = [
    "CC(=O)Nc1ccc(O)cc1",                      # парацетамол
    "CC12CCC3C(C1CCC2O)CCC4=CC(=O)CCC34C",     # тестостерон
    "OC(=O)c1ccccc1OC(C)=O",                    # аспирин
  ]
  # Morgan fingerprint (radius=2, 2048 бит)
  radius     = 2
  use_counts = true
  use_features = false

  # reverse_sigmoid: высокое сходство (>0.4) → низкий score
  # Молекулы с similarity < 0.2 получают score близкий к 1.0
  [scoring.component.transform]
  type = "reverse_sigmoid"
  low  = 0.1        # similarity < 0.1 → score ~1.0 (очень непохожа)
  high = 0.4        # similarity > 0.4 → score ~0.0 (слишком похожа)
  k    = 0.5

# ── Component 5: Brenk Filter ─────────────────────────────────
# Структурные алерты Brenk et al. (2008) — 105 нежелательных субструктур.
# Реактивные группы, токсикофоры, pan-assay interference (PAINS).
# Молекула, попадающая под ЛЮБОЙ алерт → score = 0.
[[scoring.component]]
type   = "CustomAlerts"
name   = "brenk_filter"

  [scoring.component.weight]
  value = 1.0

  [scoring.component.specific_parameters]
  smarts = [
    # ── Реактивные группы ────────────────────────────────────
    "[#6;r3]1~[#6;r3]~[#6;r3]1",               # эпоксид / азиридин
    "[#6](=O)[F,Cl,Br,I]",                      # ацилгалид
    "[CH1](=O)",                                 # альдегид
    "[S;X2](=O)",                               # сульфоксид нестаб.
    "[C,c]-S(=O)(=O)-[Cl]",                     # сульфонилхлорид
    "[$(N-!@[O;!$(O=*)])]",                     # гидроксиламин
    "N=!@N",                                     # азометин нестаб.
    "[N;!$(N-C=O)]~[N;!$(N-C=O)]",             # гидразин
    "C(=O)OC(=O)",                              # ангидрид
    "C=CC(=O)",                                  # Михаэль акцептор
    "O=CN=[N+]=[N-]",                           # изоцианат
    "[#7;!$(N-C=O);!$(N-S=O)]-[Cl,Br,I]",     # N-галогенид
    # ── Токсикофоры ──────────────────────────────────────────
    "c1ccc2c(c1)ccc3cccc4cccc2c34",             # ПАУ (полиц. ароматика)
    "c1ccc2[nH]ccc2c1",                         # β-карболин
    "[OH]c1ccc(cc1)[NH2]",                      # 4-аминофенол
    "c1ccc(cc1)N",                              # анилин незамещённый
    "[N+](=O)[O-]",                             # нитро-группа
    "C(=O)N(C=O)",                              # имид
    "[SH]",                                     # тиол свободный
    # ── PAINS / pan-assay interference ───────────────────────
    "c1ccc(cc1)C=NNc2ccccc2",                   # гидразон ароматич.
    "O=C1C=CC(=O)c2ccccc21",                    # ортохинон
    "C1=CC(=O)C=CC1=O",                         # пара-хинон
    "c1ccc(cc1)-c2ccc(cc2)O",                  # бифенол
    "Oc1ccc(cc1)-c2cccc(c2)O",                 # резорцин арил
    "[#6]~[#7]~[#7]~[#6]",                     # азо-группа
    # ── Нежелательные физхим. свойства ───────────────────────
    "[#6;r8,r9,r10,r11,r12,r13,r14]",          # макроциклы (>7 атомов)
    "[F,Cl,Br,I]-[F,Cl,Br,I]",                 # дигалогениды геминал.
    "[$(C#N),$(N#C)]",                          # изонитрил
    "C(=O)Cl",                                  # хлорангидрид
    "[P;!$(P(=O))]",                            # фосфин трёхвалентный
    "[Se]",                                     # селен
    "[Te]",                                     # теллур
  ]
